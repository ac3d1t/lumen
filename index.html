<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            --bg: #e0e0e0;
            --text: #444;
            --light-shadow: #ffffff;
            --dark-shadow: #bebebe;
            --accent: #3b82f6; 
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #cecece;
            --light-shadow: #252525;
            --dark-shadow: #0f0f0f;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        body.has-img { background-size: cover; background-position: center; }
        body.has-img .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }

        .app-shell { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

        .lumen-card {
            width: 90%; max-width: 520px; background: var(--bg); padding: 50px 40px; border-radius: 50px; text-align: center;
            box-shadow: 20px 20px 60px var(--dark-shadow), -20px -20px 60px var(--light-shadow);
        }

        .logo { font-size: 85px; font-weight: 800; letter-spacing: -7px; margin: 0 0 35px 0; user-select: none; }

        /* CARVED SEARCH BAR */
        .search-container {
            position: relative; padding: 5px; border-radius: 25px; background: var(--bg);
            box-shadow: inset 8px 8px 16px var(--dark-shadow), inset -8px -8px 16px var(--light-shadow);
            display: flex; align-items: center;
        }

        .search-input {
            width: 100%; border: none; background: transparent; padding: 15px 20px;
            font-size: 18px; color: var(--text); outline: none;
        }

        .action-group { display: flex; align-items: center; padding-right: 15px; gap: 10px; }
        
        .ai-spark-btn {
            background: var(--bg); border: none; border-radius: 12px; cursor: pointer;
            padding: 8px; display: flex; align-items: center; justify-content: center;
            box-shadow: 3px 3px 6px var(--dark-shadow), -3px -3px 6px var(--light-shadow);
            color: var(--accent);
        }
        .ai-spark-btn:hover { transform: scale(1.1); }
        .ai-spark-btn:active { box-shadow: inset 2px 2px 4px var(--dark-shadow); }

        /* AI CHAT PANEL */
        #aiPanel { width: 420px; max-height: 80vh; display: flex; flex-direction: column; }
        #aiResponse { 
            flex: 1; overflow-y: auto; padding: 20px; margin-bottom: 15px; border-radius: 20px; 
            background: var(--bg); box-shadow: inset 4px 4px 8px var(--dark-shadow);
            font-size: 14px; line-height: 1.6; text-align: left; white-space: pre-wrap;
        }

        .tile-row { display: flex; justify-content: center; gap: 20px; margin-top: 45px; flex-wrap: wrap; }
        .tile {
            width: 75px; height: 75px; border-radius: 22px; background: var(--bg);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 10px 10px 20px var(--dark-shadow), -10px -10px 20px var(--light-shadow);
            cursor: pointer;
        }
        .tile img { width: 35px; height: 35px; object-fit: contain; }

        /* PANELS */
        .panel {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 400px; background: var(--bg); padding: 30px; border-radius: 40px 40px 0 0;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.3); z-index: 100;
        }
        .panel.active { bottom: 0; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--bg); box-shadow: 6px 6px 12px var(--dark-shadow); cursor: pointer; color: var(--text); margin-top: 12px; font-weight: 700; }
        .panel input { width: 100%; margin: 10px 0; padding: 12px; border: none; border-radius: 12px; background: var(--bg); box-shadow: inset 3px 3px 6px var(--dark-shadow); color: var(--text); outline: none; }

        .corner { position: fixed; bottom: 30px; left: 30px; right: 30px; display: flex; justify-content: space-between; }
        .icon-btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: var(--bg); box-shadow: 6px 6px 12px var(--dark-shadow), -6px -6px 12px var(--light-shadow); cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
        svg { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="lumen-card glass">
            <h1 class="logo">lumen</h1>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search or talk to Lumen AI..." autofocus>
                <div class="action-group">
                    <button class="ai-spark-btn" onclick="askLumen()" title="Lumen AI">
                        <svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="tile-row" id="tileRow"></div>
    </div>

    <div id="aiPanel" class="panel">
        <h2 style="margin:0 0 10px 0">Lumen AI</h2>
        <div id="aiResponse">How can I help you today?</div>
        <button class="btn" onclick="closePanels()">Close Chat</button>
    </div>

    <div id="settingsPanel" class="panel">
        <h2 style="margin:0">Settings</h2>
        <input type="password" id="apiKeyInput" placeholder="Groq API Key (gsk_...)">
        <input type="text" id="bgInput" placeholder="Wallpaper URL">
        <button class="btn" onclick="saveSettings()">Save Config</button>
        <button class="btn" onclick="openPanel('aboutPanel')">Project Hub</button>
        <button class="btn" onclick="closePanels()">Close</button>
    </div>

    <div id="aboutPanel" class="panel">
        <span style="font-size:12px; opacity:0.5">V1.0.0</span>
        <h2>Project Hub</h2>
        <button class="btn" onclick="window.open('https://github.com/ac3d1t')">GitHub Profile</button>
        <button class="btn" onclick="closePanels()">Back</button>
    </div>

    <div id="addPanel" class="panel">
        <h2>New Tile</h2>
        <input type="text" id="tileName" placeholder="Name">
        <input type="text" id="tileUrl" placeholder="URL">
        <button class="btn" onclick="addTile()">Save</button>
        <button class="btn" onclick="closePanels()">Cancel</button>
    </div>

    <div class="corner">
        <button class="icon-btn" onclick="openPanel('aboutPanel')">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        </button>
        <div style="display:flex; gap:15px;">
            <button class="icon-btn" onclick="openPanel('settingsPanel')">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
            <button class="icon-btn" onclick="toggleTheme()">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18l-.02-16C16.45 4 20 7.59 20 12s-3.55 8-8.02 8z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById('searchInput');
        const row = document.getElementById('tileRow');
        const aiBox = document.getElementById('aiResponse');

        let store = JSON.parse(localStorage.getItem('lumen_v1_groq')) || {
            theme: 'dark', bg: '', apiKey: '',
            links: [{n:'GitHub', u:'https://github.com'}, {n:'YouTube', u:'https://youtube.com'}]
        };

        function render() {
            document.body.setAttribute('data-theme', store.theme);
            if(store.bg) { document.body.style.backgroundImage = `url('${store.bg}')`; document.body.classList.add('has-img'); }
            row.innerHTML = '';
            store.links.forEach((link, i) => {
                const tile = document.createElement('div');
                tile.className = 'tile glass';
                tile.innerHTML = `<img src="https://www.google.com/s2/favicons?sz=64&domain=${new URL(link.u).hostname}">`;
                tile.onclick = () => window.location.href = link.u;
                tile.oncontextmenu = (e) => { e.preventDefault(); store.links.splice(i,1); save(); };
                row.appendChild(tile);
            });
            const add = document.createElement('div');
            add.className = 'tile glass'; add.innerHTML = '+';
            add.onclick = () => openPanel('addPanel');
            row.appendChild(add);
        }

        async function askLumen() {
            const query = input.value.trim();
            if(!query) return alert("Talk to Lumen AI by typing something first!");
            if(!store.apiKey) return alert("Add your Groq API Key in Settings first!");

            openPanel('aiPanel');
            aiBox.innerText = "Lumen AI is thinking...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${store.apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile", // Powerful Groq model
                        messages: [{ role: "user", content: query }],
                    })
                });

                const data = await response.json();
                aiBox.innerText = data.choices[0].message.content;
            } catch (err) {
                aiBox.innerText = "Error: Could not connect to Lumen AI. Check your Groq API key.";
            }
        }

        function executeSearch() {
            const q = input.value.trim();
            if(q) window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
        }

        input.onkeypress = (e) => { if(e.key === 'Enter') executeSearch(); };
        function save() { localStorage.setItem('lumen_v1_groq', JSON.stringify(store)); render(); }
        function saveSettings() {
            store.apiKey = document.getElementById('apiKeyInput').value;
            store.bg = document.getElementById('bgInput').value;
            save(); closePanels();
        }
        function addTile() {
            const n = document.getElementById('tileName').value;
            const u = document.getElementById('tileUrl').value;
            if(n && u) { store.links.push({n, u}); save(); closePanels(); }
        }
        function toggleTheme() { store.theme = store.theme === 'light' ? 'dark' : 'light'; save(); }
        function openPanel(id) { closePanels(); document.getElementById(id).classList.add('active'); }
        function closePanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); }

        document.getElementById('apiKeyInput').value = store.apiKey;
        render();
    </script>
</body>
</html>
